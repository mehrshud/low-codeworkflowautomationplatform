apiVersion: apps/v1
kind: Deployment
metadata:
  name: low-code workflow automation platform
  labels:
    app: low-code workflow automation platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: low-code workflow automation platform
  template:
    metadata:
      labels:
        app: low-code workflow automation platform
    spec:
      containers:
      - name: low-code workflow automation platform
        image: mehrshud/Low-Code Workflow Automation Platform:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: low-code workflow automation platform-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
